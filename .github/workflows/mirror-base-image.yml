name: Mirror Base Image to GHCR

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 3am UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:
  mirror:
    name: Mirror base image
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror base image
        run: |
          set -euo pipefail
          BASE_IMAGE="${{ vars.BASE_IMAGE_DEFAULT || 'node:22-slim' }}"
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/base-images/${BASE_IMAGE}"

          echo "Mirroring $BASE_IMAGE -> $GHCR_BASE"
          docker buildx imagetools create -t "$GHCR_BASE" "docker.io/library/${BASE_IMAGE}"
          echo "Mirror complete"
