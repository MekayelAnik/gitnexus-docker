name: Promote Latest Tag
description: Promote latest tag from GHCR source and verify GHCR/Docker Hub platform parity

inputs:
  latest_version:
    description: Latest stable version (e.g. 1.2.3)
    required: true
  date_tag:
    description: Date tag suffix (e.g. DDMMYYYY)
    required: true
  ghcr_repo:
    description: GHCR repository (e.g., ghcr.io/owner/image)
    required: true
  dockerhub_repo:
    description: Docker Hub repository (e.g., owner/image)
    required: true

outputs:
  source_tag_ghcr:
    description: Resolved GHCR source tag used for latest promotion
    value: ${{ steps.promote.outputs.source_tag_ghcr }}

runs:
  using: composite
  steps:
    - name: Promote latest in registries
      id: promote
      shell: bash
      run: |
        set -euo pipefail

        run_with_retry() {
          local description="$1"
          shift
          local attempts=5
          local delay=2
          local attempt
          local err_file
          err_file="$(mktemp)"

          for attempt in $(seq 1 "$attempts"); do
            if "$@" 2>"$err_file"; then
              rm -f "$err_file"
              return 0
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "Retry ${attempt}/${attempts} for ${description} failed. Sleeping ${delay}s..." >&2
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done

          echo "${description} failed after ${attempts} attempts" >&2
          if [[ -s "$err_file" ]]; then
            echo "Last stderr output:" >&2
            cat "$err_file" >&2
          fi
          rm -f "$err_file"
          return 1
        }

        LATEST_VERSION="${{ inputs.latest_version }}"
        DATE_TAG="${{ inputs.date_tag }}"
        GHCR_REPO="${{ inputs.ghcr_repo }}"
        DOCKERHUB_REPO="${{ inputs.dockerhub_repo }}"

        SOURCE_DATE_TAG="${LATEST_VERSION}-${DATE_TAG}"
        SOURCE_FALLBACK_TAG="${LATEST_VERSION}"

        SOURCE_TAG_GHCR=""
        if run_with_retry "inspect ${GHCR_REPO}:${SOURCE_DATE_TAG}" docker buildx imagetools inspect "${GHCR_REPO}:${SOURCE_DATE_TAG}" >/dev/null; then
          SOURCE_TAG_GHCR="$SOURCE_DATE_TAG"
        elif run_with_retry "inspect ${GHCR_REPO}:${SOURCE_FALLBACK_TAG}" docker buildx imagetools inspect "${GHCR_REPO}:${SOURCE_FALLBACK_TAG}" >/dev/null; then
          SOURCE_TAG_GHCR="$SOURCE_FALLBACK_TAG"
        else
          echo "Could not resolve GHCR source tag for latest promotion" >&2
          exit 1
        fi

        run_with_retry "promote ${GHCR_REPO}:latest" docker buildx imagetools create -t "${GHCR_REPO}:latest" "${GHCR_REPO}:${SOURCE_TAG_GHCR}" >/dev/null
        run_with_retry "promote ${DOCKERHUB_REPO}:latest" docker buildx imagetools create -t "${DOCKERHUB_REPO}:latest" "${GHCR_REPO}:${SOURCE_TAG_GHCR}" >/dev/null

        echo "source_tag_ghcr=$SOURCE_TAG_GHCR" >> "$GITHUB_OUTPUT"

    - name: Verify latest tag points to detected latest version
      shell: bash
      run: |
        set -euo pipefail

        run_with_retry_output() {
          local description="$1"
          shift
          local attempts=5
          local delay=2
          local attempt
          local err_file
          local out
          err_file="$(mktemp)"

          for attempt in $(seq 1 "$attempts"); do
            if out="$("$@" 2>"$err_file")"; then
              rm -f "$err_file"
              printf '%s' "$out"
              return 0
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "Retry ${attempt}/${attempts} for ${description} failed. Sleeping ${delay}s..." >&2
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done

          echo "${description} failed after ${attempts} attempts" >&2
          if [[ -s "$err_file" ]]; then
            echo "Last stderr output:" >&2
            cat "$err_file" >&2
          fi
          rm -f "$err_file"
          return 1
        }

        inspect_text() {
          local ref="$1"
          run_with_retry_output "inspect ${ref}" docker buildx imagetools inspect "$ref"
        }

        inspect_raw() {
          local ref="$1"
          run_with_retry_output "inspect raw ${ref}" docker buildx imagetools inspect --raw "$ref"
        }

        inspect_raw_optional() {
          local ref="$1"
          local label="$2"
          local err_file
          local out
          err_file="$(mktemp)"

          if out="$(docker buildx imagetools inspect --raw "$ref" 2>"$err_file")"; then
            rm -f "$err_file"
            printf '%s' "$out"
            return 0
          fi

          if grep -qiE '429|toomanyrequests|rate limit' "$err_file"; then
            echo "::warning::Skipping deep raw verification for ${label} due to registry rate limiting on ${ref}" >&2
            rm -f "$err_file"
            return 2
          fi

          echo "Failed optional raw inspect for ${label} (${ref})" >&2
          if [[ -s "$err_file" ]]; then
            cat "$err_file" >&2
          fi
          rm -f "$err_file"
          return 1
        }

        LATEST_VERSION="${{ inputs.latest_version }}"
        GHCR_REPO="${{ inputs.ghcr_repo }}"
        DOCKERHUB_REPO="${{ inputs.dockerhub_repo }}"

        GHCR_VERSION_INSPECT="$(inspect_text "${GHCR_REPO}:${LATEST_VERSION}")"
        GHCR_LATEST_INSPECT="$(inspect_text "${GHCR_REPO}:latest")"
        DH_LATEST_INSPECT="$(inspect_text "${DOCKERHUB_REPO}:latest")"

        mapfile -t GHCR_VERSION_PLATFORMS < <(echo "$GHCR_VERSION_INSPECT" | awk '/Platform:/{print $2}' | sort -u)
        mapfile -t GHCR_LATEST_PLATFORMS < <(echo "$GHCR_LATEST_INSPECT" | awk '/Platform:/{print $2}' | sort -u)
        mapfile -t DH_LATEST_PLATFORMS < <(echo "$DH_LATEST_INSPECT" | awk '/Platform:/{print $2}' | sort -u)

        if [[ "${#GHCR_VERSION_PLATFORMS[@]}" -eq 0 || "${#GHCR_LATEST_PLATFORMS[@]}" -eq 0 || "${#DH_LATEST_PLATFORMS[@]}" -eq 0 ]]; then
          echo "Platform list resolution failed during latest verification" >&2
          exit 1
        fi

        GHCR_VERSION_DIGEST="$(echo "$GHCR_VERSION_INSPECT" | awk '/^Digest:/{print $2; exit}')"
        GHCR_LATEST_DIGEST="$(echo "$GHCR_LATEST_INSPECT" | awk '/^Digest:/{print $2; exit}')"

        if [[ -z "$GHCR_VERSION_DIGEST" || -z "$GHCR_LATEST_DIGEST" ]]; then
          echo "Digest resolution failed during latest verification" >&2
          exit 1
        fi

        if [[ "$GHCR_VERSION_DIGEST" != "$GHCR_LATEST_DIGEST" ]]; then
          echo "GHCR latest digest does not match latest version digest (${LATEST_VERSION})" >&2
          echo "Version digest: $GHCR_VERSION_DIGEST" >&2
          echo "Latest digest:  $GHCR_LATEST_DIGEST" >&2
          exit 1
        fi

        GHCR_VERSION_PLATFORMS_STR="$(printf '%s\n' "${GHCR_VERSION_PLATFORMS[@]}")"
        GHCR_LATEST_PLATFORMS_STR="$(printf '%s\n' "${GHCR_LATEST_PLATFORMS[@]}")"
        DH_LATEST_PLATFORMS_STR="$(printf '%s\n' "${DH_LATEST_PLATFORMS[@]}")"

        if [[ "$GHCR_VERSION_PLATFORMS_STR" != "$GHCR_LATEST_PLATFORMS_STR" ]]; then
          echo "GHCR latest platforms do not match latest version tag (${LATEST_VERSION})" >&2
          echo "Version platforms:" >&2
          echo "$GHCR_VERSION_PLATFORMS_STR" >&2
          echo "Latest platforms:" >&2
          echo "$GHCR_LATEST_PLATFORMS_STR" >&2
          exit 1
        fi

        if [[ "$GHCR_LATEST_PLATFORMS_STR" != "$DH_LATEST_PLATFORMS_STR" ]]; then
          echo "Docker Hub latest platforms do not match GHCR latest platforms" >&2
          echo "GHCR latest platforms:" >&2
          echo "$GHCR_LATEST_PLATFORMS_STR" >&2
          echo "Docker Hub latest platforms:" >&2
          echo "$DH_LATEST_PLATFORMS_STR" >&2
          exit 1
        fi

        GHCR_LATEST_RAW="$(inspect_raw "${GHCR_REPO}:latest")"

        DH_LATEST_RAW=""
        set +e
        DH_LATEST_RAW="$(inspect_raw_optional "${DOCKERHUB_REPO}:latest" "dockerhub latest")"
        rc=$?
        set -e
        if [[ "$rc" -ne 0 && "$rc" -ne 2 ]]; then
          exit "$rc"
        fi

        if [[ -z "$DH_LATEST_RAW" ]]; then
          echo "::warning::Deep raw latest verification skipped for Docker Hub due to rate limit; digest/platform parity checks already passed" >&2
          echo "Latest tag verification passed for version ${LATEST_VERSION} (raw deep check skipped)"
          echo "GHCR digest: ${GHCR_LATEST_DIGEST}"
          exit 0
        fi

        GHCR_IS_INDEX="$(echo "$GHCR_LATEST_RAW" | jq -r 'has("manifests")')"
        DH_IS_INDEX="$(echo "$DH_LATEST_RAW" | jq -r 'has("manifests")')"

        if [[ "$GHCR_IS_INDEX" == "true" || "$DH_IS_INDEX" == "true" ]]; then
          if [[ "$GHCR_IS_INDEX" != "$DH_IS_INDEX" ]]; then
            echo "Registry media type mismatch: one latest tag is multi-arch index and the other is not" >&2
            exit 1
          fi

          GHCR_CHILD_MAP="$(
            echo "$GHCR_LATEST_RAW" \
              | jq -r '.manifests[]
                  | select(.platform.os != null and .platform.architecture != null)
                  | "\(.platform.os)/\(.platform.architecture)\(if .platform.variant then "/" + .platform.variant else "" end)=\(.digest)"' \
              | sort -u
          )"

          DH_CHILD_MAP="$(
            echo "$DH_LATEST_RAW" \
              | jq -r '.manifests[]
                  | select(.platform.os != null and .platform.architecture != null)
                  | "\(.platform.os)/\(.platform.architecture)\(if .platform.variant then "/" + .platform.variant else "" end)=\(.digest)"' \
              | sort -u
          )"

          if [[ -z "$GHCR_CHILD_MAP" || -z "$DH_CHILD_MAP" ]]; then
            echo "Child manifest digest extraction failed for multi-arch comparison" >&2
            exit 1
          fi

          if [[ "$GHCR_CHILD_MAP" != "$DH_CHILD_MAP" ]]; then
            echo "Docker Hub latest child manifest digests do not match GHCR latest" >&2
            echo "GHCR child map:" >&2
            echo "$GHCR_CHILD_MAP" >&2
            echo "Docker Hub child map:" >&2
            echo "$DH_CHILD_MAP" >&2
            exit 1
          fi
        else
          GHCR_CONFIG_DIGEST="$(echo "$GHCR_LATEST_RAW" | jq -r '.config.digest // ""')"
          DH_CONFIG_DIGEST="$(echo "$DH_LATEST_RAW" | jq -r '.config.digest // ""')"

          GHCR_LAYER_DIGESTS="$(echo "$GHCR_LATEST_RAW" | jq -r '.layers[]?.digest // empty' | sort -u)"
          DH_LAYER_DIGESTS="$(echo "$DH_LATEST_RAW" | jq -r '.layers[]?.digest // empty' | sort -u)"

          if [[ -z "$GHCR_CONFIG_DIGEST" || -z "$DH_CONFIG_DIGEST" ]]; then
            echo "Config digest extraction failed for single-arch comparison" >&2
            exit 1
          fi

          if [[ "$GHCR_CONFIG_DIGEST" != "$DH_CONFIG_DIGEST" || "$GHCR_LAYER_DIGESTS" != "$DH_LAYER_DIGESTS" ]]; then
            echo "Docker Hub latest single-arch content digests do not match GHCR latest" >&2
            echo "GHCR config digest: $GHCR_CONFIG_DIGEST" >&2
            echo "Docker Hub config digest: $DH_CONFIG_DIGEST" >&2
            echo "GHCR layer digests:" >&2
            echo "$GHCR_LAYER_DIGESTS" >&2
            echo "Docker Hub layer digests:" >&2
            echo "$DH_LAYER_DIGESTS" >&2
            exit 1
          fi
        fi

        echo "Latest tag verification passed for version ${LATEST_VERSION}"
        echo "GHCR digest: ${GHCR_LATEST_DIGEST}"
